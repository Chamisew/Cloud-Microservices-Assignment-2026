      - name: Start mock services
        run: |
          cd /tmp/mock-services
          python mock_user_service.py &
          python mock_token_service.py &
          sleep 5

      - name: Run integration tests
        run: |
          cd queue-service
          # Set environment variables for testing
          export MONGO_URI="mongodb://localhost:27017/test_db"
          export USER_SERVICE_URL="http://localhost:5001"
          export TOKEN_SERVICE_URL="http://localhost:5003"
          export FLASK_ENV=test
          
          # Run tests with mock services
          python -m pytest tests/ -v --tb=short || true

