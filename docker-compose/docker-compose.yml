version: '3.8'

services:
  # User Service
  user-service:
    build:
      context: ../user-service
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
      - MONGO_URI=${MONGO_URI}
      - PORT=5001
    depends_on:
      - mongodb
    networks:
      - smart-queue-network

  # Queue Service
  queue-service:
    build:
      context: ../queue-service
      dockerfile: Dockerfile
    ports:
      - "5002:5002"
    environment:
      - MONGO_URI=${MONGO_URI}
      - PORT=5002
      - USER_SERVICE_URL=http://user-service:5001
      - TOKEN_SERVICE_URL=http://token-service:5003
    depends_on:
      - mongodb
    networks:
      - smart-queue-network

  # Token Service
  token-service:
    build:
      context: ../token-service
      dockerfile: Dockerfile
    ports:
      - "5003:5003"
    environment:
      - MONGO_URI=${MONGO_URI}
      - PORT=5003
      - NOTIFICATION_SERVICE_URL=http://notification-service:5004
    depends_on:
      - mongodb
    networks:
      - smart-queue-network

  # Notification Service
  notification-service:
    build:
      context: ../notification-service
      dockerfile: Dockerfile
    ports:
      - "5004:5004"
    environment:
      - MONGO_URI=${MONGO_URI}
      - PORT=5004
    depends_on:
      - mongodb
    networks:
      - smart-queue-network

  # MongoDB Database
  mongodb:
    image: mongo:5.0
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
      - MONGO_INITDB_DATABASE=smart_queue_db
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - smart-queue-network

  # MongoDB Express (Web UI for MongoDB)
  mongo-express:
    image: mongo-express:latest
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
      - ME_CONFIG_MONGODB_ADMINPASSWORD=password
      - ME_CONFIG_MONGODB_SERVER=mongodb
    depends_on:
      - mongodb
    networks:
      - smart-queue-network

networks:
  smart-queue-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local